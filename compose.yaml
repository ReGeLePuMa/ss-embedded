services:
  broker:
    image: eclipse-mosquitto:latest
    restart: always
    container_name: broker
    hostname: broker
    volumes:
      - ./mosquitto/config:/mosquitto/config/mosquitto.conf
      - ./certs/:/certs

  receiver:
    build: ./receiver
    container_name: receiver
    restart: always
    hostname: receiver
    depends_on:
      - broker
    ports:
      - 8080:8080
    environment:
      - BROKER_HOST=broker
      - BROKER_PORT=8883
      - DISPLAY=${DISPLAY}
    volumes:
      - ./certs/ca.crt:/certs/ca.crt
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
